---
layout: default
---
<div class="single-header">
  <div class="single-meta">
    <span class="breadcrumb"><a href="{{ '/writing/' | relative_url }}">← All Writing</a></span>
    <h1 class="single-title">{{ page.title }}</h1>
    <div class="single-subline">
      <span class="mono muted" style="font-size:var(--sz-xs);">{{ page.date | date: "%Y · %b %-d" }}</span>
      {% if page.tags %}
        <span class="post-tag">{{ page.tags | join: " · " }}</span>
      {% endif %}
    </div>
  </div>
</div>
<article class="single-content">
  {{ content }}
</article>
