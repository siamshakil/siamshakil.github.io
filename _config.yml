# Collections - this is what turns folders into structured content
collections:
  projects:
    output: true
    permalink: /projects/:path/
  posts:
    output: true
    permalink: /writing/:year/:month/:title/

# Build settings
markdown: kramdown
permalink: /writing/:year/:month/:title/
plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

include:
  - assets/photos

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
